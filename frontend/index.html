<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceGPT — AI Stock Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF9;
    --card: #FFFFFF;
    --ink: #0F1115;
    --muted: #6E6A64;
    --line: #E8E6E1;
    --accent: #3D5AFE;
    --accent-deep: #2541D8;
    --gain: #16A34A;
    --loss: #DC2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* ---------- Ticker tape ---------- */
  .ticker-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--ink);
    border-bottom: 1px solid #23262e;
    overflow: hidden;
    white-space: nowrap;
    padding: 11px 0;
  }

  .ticker-track {
    display: inline-flex;
    animation: scroll-left 38s linear infinite;
  }

  .ticker-wrap:hover .ticker-track { animation-play-state: paused; }

  @keyframes scroll-left {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    padding: 0 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #C9CBD3;
    border-right: 1px solid #2A2D36;
  }

  .ticker-item .sym { color: #fff; font-weight: 600; letter-spacing: 0.02em; }
  .ticker-item .chg.up { color: #4ADE80; }
  .ticker-item .chg.down { color: #F87171; }
  .ticker-item .chg.flat { color: #8A8D96; }

  /* ---------- Header / hero ---------- */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .hero {
    padding: 88px 24px 48px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-deep);
    background: rgba(61, 90, 254, 0.08);
    display: inline-block;
    padding: 6px 12px;
    border-radius: 100px;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(34px, 5.5vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent-deep);
  }

  .sub {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 480px;
    margin: 0 auto 40px;
  }

  /* ---------- Search ---------- */
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 6px 6px 6px 20px;
    max-width: 520px;
    margin: 0 auto;
    box-shadow: 0 1px 2px rgba(15,17,21,0.04), 0 12px 32px -16px rgba(15,17,21,0.10);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(61,90,254,0.12), 0 12px 32px -16px rgba(15,17,21,0.14);
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

  .search-box input::placeholder {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    text-transform: none;
    color: #B4B0A8;
  }

  .search-box button {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 13px 22px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    white-space: nowrap;
  }

  .search-box button:hover { background: var(--accent-deep); }
  .search-box button:active { transform: scale(0.97); }
  .search-box button:disabled { background: #C4C2BC; cursor: not-allowed; }

  .hint-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .hint-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .hint-chip:hover { border-color: var(--accent); color: var(--accent-deep); }

  /* ---------- Result area ---------- */
  .result-area {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px 100px;
    min-height: 80px;
  }

  .state-msg {
    text-align: center;
    color: var(--muted);
    font-size: 14.5px;
    padding: 32px 0;
  }

  .state-msg.error { color: var(--loss); }

  .spinner {
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 1px 2px rgba(15,17,21,0.04), 0 24px 48px -24px rgba(15,17,21,0.12);
    animation: rise 0.45s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .result-id .sym-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent-deep);
    text-transform: uppercase;
  }

  .result-id .company {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--ink);
    margin-top: 2px;
  }

  .price-block { text-align: right; }

  .price-block .price {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
  }

  .price-block .delta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    margin-top: 6px;
  }

  .delta.up { color: var(--gain); }
  .delta.down { color: var(--loss); }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--card);
    padding: 16px 18px;
  }

  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .analysis-block {
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }

  .analysis-block .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent-deep);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .analysis-block .label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .analysis-block p {
    font-size: 16px;
    line-height: 1.65;
    color: #2A2D33;
  }

  footer {
    text-align: center;
    padding: 32px 24px 60px;
    color: var(--muted);
    font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 540px) {
    .hero { padding: 56px 20px 36px; }
    .result-card { padding: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .price-block .price { font-size: 30px; }
    .result-top { flex-direction: column; }
    .price-block { text-align: left; }
  }

  /* keyboard focus visibility */
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker-track" id="tickerTrack">
      <!-- populated by JS, duplicated once for seamless loop -->
    </div>
  </div>

  <div class="hero">
    <span class="eyebrow">Local AI · Real-time data</span>
    <h1>Ask the market<br><em>anything.</em></h1>
    <p class="sub">Type a ticker. Get live pricing pulled straight from Yahoo Finance, analyzed instantly by a model running entirely on your machine.</p>

    <form class="search-box" id="searchForm">
      <input
        type="text"
        id="tickerInput"
        placeholder="AAPL, MSFT, TSLA…"
        autocomplete="off"
        spellcheck="false"
        maxlength="10"
      >
      <button type="submit" id="searchBtn">Analyze</button>
    </form>

    <div class="hint-row">
      <button type="button" class="hint-chip" data-ticker="AAPL">AAPL</button>
      <button type="button" class="hint-chip" data-ticker="NVDA">NVDA</button>
      <button type="button" class="hint-chip" data-ticker="TSLA">TSLA</button>
      <button type="button" class="hint-chip" data-ticker="MSFT">MSFT</button>
    </div>
  </div>

  <div class="result-area" id="resultArea"></div>

  <footer>FinanceGPT — powered by Llama 3.1, running locally via Ollama</footer>

<script>
  const API_BASE = '';

  // ---------- Ticker tape ----------
  async function loadTickerTape() {
    const track = document.getElementById('tickerTrack');
    try {
      const res = await fetch(`${API_BASE}/ticker-stats`);
      const data = await res.json();
      const items = data.stocks.filter(s => s.price !== null);
      if (!items.length) return;

      const renderSet = () => items.map(s => {
        const dir = s.change_pct > 0 ? 'up' : s.change_pct < 0 ? 'down' : 'flat';
        const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '·';
        const pct = s.change_pct !== null ? `${arrow} ${Math.abs(s.change_pct).toFixed(2)}%` : '—';
        return `<span class="ticker-item"><span class="sym">${s.ticker}</span><span>$${s.price.toFixed(2)}</span><span class="chg ${dir}">${pct}</span></span>`;
      }).join('');

      // duplicate content for seamless infinite scroll
      track.innerHTML = renderSet() + renderSet();
    } catch (err) {
      track.innerHTML = '<span class="ticker-item"><span class="sym">FinanceGPT</span><span>Live data unavailable — backend not reachable</span></span>';
    }
  }

  // ---------- Search ----------
  const form = document.getElementById('searchForm');
  const input = document.getElementById('tickerInput');
  const btn = document.getElementById('searchBtn');
  const resultArea = document.getElementById('resultArea');

  function fmtNum(n) {
    if (n === null || n === undefined) return '—';
    return n.toLocaleString('en-US');
  }

  function fmtMarketCap(n) {
    if (n === null || n === undefined) return '—';
    if (n >= 1e12) return `$${(n / 1e12).toFixed(2)}T`;
    if (n >= 1e9) return `$${(n / 1e9).toFixed(2)}B`;
    if (n >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
    return `$${n}`;
  }

  async function runSearch(ticker) {
    ticker = ticker.trim().toUpperCase();
    if (!ticker) return;

    btn.disabled = true;
    btn.textContent = 'Analyzing…';

    resultArea.innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        Pulling live data and running local analysis on <strong>${ticker}</strong>…
      </div>
    `;

    try {
      const res = await fetch(`${API_BASE}/analyze/${encodeURIComponent(ticker)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Request failed (${res.status})`);
      }
      const data = await res.json();
      renderResult(data);
    } catch (err) {
      resultArea.innerHTML = `<div class="state-msg error">${err.message || 'Something went wrong. Is the backend running?'}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze';
    }
  }

  function renderResult(data) {
    const s = data.stock_data;
    const change = (s.current_price !== null && s.previous_close)
      ? s.current_price - s.previous_close
      : null;
    const changePct = (change !== null && s.previous_close)
      ? (change / s.previous_close) * 100
      : null;
    const dir = change > 0 ? 'up' : change < 0 ? 'down' : '';
    const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '';

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div class="result-id">
            <div class="sym-big">${s.ticker}</div>
            <div class="company">${s.company_name || s.ticker}</div>
          </div>
          <div class="price-block">
            <div class="price">$${s.current_price !== null ? s.current_price.toFixed(2) : '—'}</div>
            ${change !== null ? `<div class="delta ${dir}">${arrow} ${Math.abs(change).toFixed(2)} (${Math.abs(changePct).toFixed(2)}%)</div>` : ''}
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat"><div class="label">Open</div><div class="value">$${s.open_price !== null ? s.open_price.toFixed(2) : '—'}</div></div>
          <div class="stat"><div class="label">Day range</div><div class="value">${s.day_low?.toFixed(2) ?? '—'}–${s.day_high?.toFixed(2) ?? '—'}</div></div>
          <div class="stat"><div class="label">52w range</div><div class="value">${s.fifty_two_week_low?.toFixed(2) ?? '—'}–${s.fifty_two_week_high?.toFixed(2) ?? '—'}</div></div>
          <div class="stat"><div class="label">Volume</div><div class="value">${fmtNum(s.volume)}</div></div>
          <div class="stat"><div class="label">Market cap</div><div class="value">${fmtMarketCap(s.market_cap)}</div></div>
          <div class="stat"><div class="label">P/E ratio</div><div class="value">${s.pe_ratio !== null ? s.pe_ratio.toFixed(2) : '—'}</div></div>
        </div>

        <div class="analysis-block">
          <div class="label">AI Analysis</div>
          <p>${data.ai_analysis}</p>
        </div>
      </div>
    `;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    runSearch(input.value);
  });

  document.querySelectorAll('.hint-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      input.value = chip.dataset.ticker;
      runSearch(chip.dataset.ticker);
    });
  });

  loadTickerTape();
  // refresh ticker tape every 60s
  setInterval(loadTickerTape, 60000);
</script>

</body>
</html>
